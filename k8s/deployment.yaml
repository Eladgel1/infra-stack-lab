apiVersion: apps/v1
kind: Deployment
metadata:
  name: infra-stack-lab-api
  namespace: infra-stack-lab
  labels:
    app.kubernetes.io/name: infra-stack-lab
    app.kubernetes.io/component: api
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: infra-stack-lab
      app.kubernetes.io/component: api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: infra-stack-lab
        app.kubernetes.io/component: api
    spec:
      containers:
        - name: infra-stack-lab-api
          image: infra-stack-lab:prod
          imagePullPolicy: Never
          ports:
            - containerPort: 3000
          env:
            - name: PORT
              valueFrom:
                configMapKeyRef:
                  name: infra-stack-lab-config
                  key: PORT
            - name: NODE_ENV
              valueFrom:
                configMapKeyRef:
                  name: infra-stack-lab-config
                  key: NODE_ENV
            - name: LOG_LEVEL
              valueFrom:
                configMapKeyRef:
                  name: infra-stack-lab-config
                  key: LOG_LEVEL
            - name: CORS_ORIGIN
              valueFrom:
                configMapKeyRef:
                  name: infra-stack-lab-config
                  key: CORS_ORIGIN
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: infra-stack-lab-secrets
                  key: DATABASE_URL
            - name: ARCJET_KEY
              valueFrom:
                secretKeyRef:
                  name: infra-stack-lab-secrets
                  key: ARCJET_KEY
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          resources:
            requests:
              cpu: '100m'
              memory: '128Mi'
            limits:
              cpu: '300m'
              memory: '256Mi'
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
