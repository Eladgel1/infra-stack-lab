apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: infra-stack-lab-hpa
  namespace: infra-stack-lab
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: infra-stack-lab-api
  minReplicas: 2
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
